<div class="module-card">
  <div class="module-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;">
    <div>
      <h2>Criar Empresa</h2>
      <p>Cadastro disponível somente para Administrador. Cada empresa criada fica separada por ID/CNPJ para não cruzar informações.</p>
    </div>
  </div>

  <form id="empresa-create-form" class="form-grid" style="margin-top:18px;">
    <div class="form-group">
      <label for="nova-empresa-name">Nome da empresa *</label>
      <input id="nova-empresa-name" type="text" required placeholder="Ex.: Distribuidora Norte">
    </div>
    <div class="form-group">
      <label for="nova-empresa-cnpj">CNPJ / ID da empresa</label>
      <input id="nova-empresa-cnpj" type="text" placeholder="Ex.: 00.000.000/0001-00">
    </div>
    <div class="form-group">
      <label for="nova-empresa-phone">Telefone</label>
      <input id="nova-empresa-phone" type="text" placeholder="(00) 00000-0000">
    </div>
    <div class="form-group">
      <label for="nova-empresa-email">E-mail</label>
      <input id="nova-empresa-email" type="email" placeholder="empresa@email.com">
    </div>
    <div class="form-group">
      <label for="nova-empresa-unidade">Unidade inicial *</label>
      <input id="nova-empresa-unidade" type="text" required value="Unidade Geral">
    </div>
    <div class="form-actions" style="align-self:end;">
      <button type="submit" class="btn btn-primary">+ Criar Empresa</button>
    </div>
  </form>
</div>

<div class="module-card" style="margin-top:18px;">
  <div class="module-header">
    <h2>Empresas cadastradas</h2>
    <p>Lista geral visível apenas para administrador.</p>
  </div>
  <div class="table-responsive" style="margin-top:14px;">
    <table class="data-table">
      <thead>
        <tr>
          <th>Empresa</th>
          <th>ID/CNPJ</th>
          <th>Telefone</th>
          <th>E-mail</th>
          <th>Criada em</th>
        </tr>
      </thead>
      <tbody id="empresas-table-body">
        <tr><td colspan="5" style="text-align:center;color:var(--text-muted);">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>
