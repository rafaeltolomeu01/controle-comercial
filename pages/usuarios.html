<div class="card" id="user-form-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
              <span class="card-title">Cadastrar Novo Usuário (Acesso)</span>
              <button class="btn btn-primary" id="btn-open-user-form" type="button">+ Cadastrar Usuário</button>
            </div>
            
            <div id="user-form-container" class="hidden" style="padding: 24px;">
              <form id="user-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="user-fullname">Nome Completo</label>
                  <input type="text" id="user-fullname" required placeholder="Ex: João da Silva">
                </div>
                <div class="form-group">
                  <label for="user-username">Login / Usuário</label>
                  <input type="text" id="user-username" required placeholder="Ex: joao.silva">
                </div>
                <div class="form-group">
                  <label for="user-pass">Senha de Acesso</label>
                  <input type="password" id="user-pass" required placeholder="Digite a senha">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="user-profile">Perfil de Acesso</label>
                  <select id="user-profile" required>
                    <option value="Administrador">Administrador</option>
                    <option value="Supervisor">Supervisor</option>
                    <option value="Financeiro">Financeiro</option>
                    <option value="Conferente">Conferente</option>
                    <option value="Responsável Equipamentos">Responsável Equipamentos</option>
                    <option value="Mecânico">Mecânico</option>
                    <option value="Vendedor">Vendedor</option>
                    <option value="Motorista">Motorista</option>
                    <option value="Ajudante de Motorista">Ajudante de Motorista</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="user-unit">Unidades Vinculadas</label>
                  <select id="user-unit" required multiple size="4" aria-describedby="user-unit-help">
                    <!-- Injected dynamically -->
                  </select>
                  <small id="user-unit-help" style="display:block;margin-top:6px;color:var(--text-muted);">Selecione uma ou mais unidades. Use “Todas as Unidades” somente para acesso geral autorizado.</small>
                </div>
              </div>
              <div id="new-user-supervisor-section" class="form-group" style="display:none; margin-top:16px;">
                <label style="font-weight:600; color:var(--text-primary);">Vendedores Vinculados ao Supervisor</label>
                <div id="new-user-vendedores-checklist" style="max-height:200px; overflow-y:auto; border:1px solid var(--border-color,#334); border-radius:8px; padding:12px; margin-top:8px; background:var(--bg-secondary,#1a2035);">
                  <span style="color:var(--text-muted); font-size:0.85rem;">Selecione o perfil Supervisor para carregar a lista de vendedores.</span>
                </div>
              </div>
              <div id="new-user-seller-section" class="form-group" style="display:none; margin-top:16px;">
                <label for="new-user-supervisor-id" style="font-weight:600; color:var(--text-primary);">Supervisor Responsável *</label>
                <select id="new-user-supervisor-id" style="margin-top:8px;">
                  <option value="">Selecione um Supervisor...</option>
                </select>
              </div>
              <div style="display:flex; gap:12px; margin-top:24px;">
                <button type="submit" class="btn btn-primary" style="flex: 1; height: 44px; font-weight: 600;">Cadastrar Usuário</button>
                <button type="button" class="btn btn-secondary" id="btn-cancel-user-form" style="height: 44px; font-weight: 600; padding: 0 24px;">Cancelar</button>
              </div>
            </form>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Usuários Cadastrados no Sistema</span>
            </div>
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Login</th>
                    <th>Perfil</th>
                    <th>Unidade</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="users-table-body">
                  <!-- Injected dynamically -->
                </tbody>
              </table>
            </div>
          </div>
