<div class="card" id="user-form-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
              <span class="card-title">Cadastrar Novo Usuário (Acesso)</span>
              <button class="btn btn-primary" id="btn-open-user-form" type="button">+ Cadastrar Usuário</button>
            </div>
            
            <div id="user-form-container" class="hidden" style="padding: 24px;">
              <form id="user-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="user-fullname">Nome Completo</label>
                  <input type="text" id="user-fullname" required placeholder="Ex: João da Silva">
                </div>
                <div class="form-group">
                  <label for="user-username">Login / Usuário</label>
                  <input type="text" id="user-username" required placeholder="Ex: joao.silva">
                </div>
                <div class="form-group">
                  <label for="user-pass">Senha de Acesso</label>
                  <input type="password" id="user-pass" required placeholder="Digite a senha">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="user-profile">Perfil de Acesso</label>
                  <select id="user-profile" required>
                    <option value="Administrador">Administrador</option>
                    <option value="Supervisor">Supervisor</option>
                    <option value="Financeiro">Financeiro</option>
                    <option value="Conferente">Conferente</option>
                    <option value="Responsável Equipamentos">Responsável Equipamentos</option>
                    <option value="Mecânico">Mecânico</option>
                    <option value="Vendedor">Vendedor</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="user-unit">Unidade Vinculada</label>
                  <select id="user-unit" required>
                    <!-- Injected dynamically -->
                  </select>
                </div>
              </div>
              <div style="display:flex; gap:12px; margin-top:24px;">
                <button type="submit" class="btn btn-primary" style="flex: 1; height: 44px; font-weight: 600;">Cadastrar Usuário</button>
                <button type="button" class="btn btn-secondary" id="btn-cancel-user-form" style="height: 44px; font-weight: 600; padding: 0 24px;">Cancelar</button>
              </div>
            </form>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Usuários Cadastrados no Sistema</span>
            </div>
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Login</th>
                    <th>Perfil</th>
                    <th>Unidade</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="users-table-body">
                  <!-- Injected dynamically -->
                </tbody>
              </table>
            </div>
          </div>
