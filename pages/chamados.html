<!-- ABERTURA DE CHAMADO (VENDEDOR) -->
          <div class="card" id="ticket-open-card">

              <span class="card-title">Abertura de Chamado Corretivo / Mecânico</span>
              <button class="btn btn-primary" id="btn-open-ticket-form" type="button">+ Abrir Chamado Mecânico</button>
            </div>
            <div id="ticket-form-container" class="hidden" style="padding:24px;">
              <form id="ticket-open-form">
                <div class="form-row">
                  <div class="form-group">
                    <label for="ticket-open-unit">Unidade *</label>
                    <select id="ticket-open-unit" required>
                      <!-- Injected dynamically -->
                    </select>
                  </div>
                  <div class="form-group" id="group-ticket-open-seller">
                    <label for="ticket-open-seller">Vendedor Responsável *</label>
                    <select id="ticket-open-seller" required>
                      <!-- Injected dynamically -->
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="ticket-open-eq-type">Tipo de Equipamento *</label>
                    <select id="ticket-open-eq-type" required>
                      <option value="" disabled selected>Selecione...</option>
                      <option value="Freezer">Freezer</option>
                      <option value="Ilha">Ilha</option>
                      <option value="Expositor">Expositor</option>
                      <option value="Carrinho">Carrinho</option>
                      <option value="Caixa Fria">Caixa Fria</option>
                      <option value="Câmara Fria">Câmara Fria</option>
                      <option value="Refrigerador">Refrigerador</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="ticket-open-serial">Nº Patrimônio (Digitado Manualmente) *</label>
                    <input type="text" id="ticket-open-serial" required placeholder="Digite o nº do patrimônio...">
                  </div>
                </div>

                <!-- Container para histórico do patrimônio se existir -->
                <div id="ticket-open-history-container" style="margin-bottom: 0px;"></div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="ticket-open-client-code">CÃ³digo do Cliente</label>
                    <input type="text" id="ticket-open-client-code" placeholder="Digite o cÃ³digo, se houver...">
                  </div>
                  <div class="form-group">
                    <label for="ticket-open-client">Cliente *</label>
                    <input type="text" id="ticket-open-client" required placeholder="Nome do cliente/comércio...">
                  </div>
                  <div class="form-group">
                    <label for="ticket-open-fantasy">Nome Fantasia *</label>
                    <input type="text" id="ticket-open-fantasy" required placeholder="Nome fantasia...">
                  </div>
                  <div class="form-group">
                    <label for="ticket-open-city">Cidade *</label>
                    <input type="text" id="ticket-open-city" required placeholder="Cidade...">
                  </div>
                  <div class="form-group">
                    <label for="ticket-open-address">Endereço *</label>
                    <input type="text" id="ticket-open-address" required placeholder="Endereço completo...">
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group" style="grid-column: span 2;">
                    <label for="ticket-open-title">Descrição Simplificada da Falha *</label>
                    <input type="text" id="ticket-open-title" required placeholder="Ex: Equipamento não liga, sem resfriamento, barulho forte..." style="height:44px;">
                  </div>
                  <div class="form-group">
                    <label for="ticket-open-priority">Nível de Prioridade *</label>
                    <select id="ticket-open-priority" required>
                      <option value="" disabled selected>Selecione...</option>
                      <option value="Baixa">Baixa — Manutenção agendada</option>
                      <option value="Média">Média — Perda parcial de função</option>
                      <option value="Alta">Alta — Equipamento totalmente inativo</option>
                    </select>
                  </div>
                </div>

                <div class="form-row" style="grid-template-columns: 1fr 1fr; gap:12px; margin-top: 10px;">
                  <div class="form-group" style="background-color:rgba(255,255,255,0.01); border:1px solid var(--border-color); border-radius:6px; padding:10px;">
                    <label for="ticket-open-photo-defect" style="font-weight:600; font-size:0.75rem;">Fotos do Defeito *</label>
                    <input type="file" id="ticket-open-photo-defect" accept="image/*" required style="font-size:0.75rem; margin-top:4px;">
                    <div id="preview-ticket-open-photo-container" style="display:none; margin-top:6px;">
                      <img id="preview-img-ticket-open-photo" src="" style="max-height:60px; border-radius:4px; border:1px solid var(--border-color);">
                    </div>
                  </div>
                  <div class="form-group" style="background-color:rgba(255,255,255,0.01); border:1px solid var(--border-color); border-radius:6px; padding:10px;">
                    <label for="ticket-open-video-defect" style="font-weight:600; font-size:0.75rem;">Vídeos do Defeito (opcional)</label>
                    <input type="file" id="ticket-open-video-defect" accept="video/*" style="font-size:0.75rem; margin-top:4px;">
                  </div>
                </div>

                <div class="form-group" style="margin-top: 12px;">
                  <label for="ticket-open-obs">Observações</label>
                  <textarea id="ticket-open-obs" rows="3" placeholder="Insira observações relevantes sobre o defeito ou localização..."></textarea>
                </div>

                <div style="display:flex; gap:12px; margin-top:24px;">
                  <button type="submit" class="btn btn-primary" style="flex:1; height:44px; font-size:1rem; font-weight:600;">Abrir Chamado Corretivo</button>
                  <button type="button" class="btn btn-secondary" id="btn-cancel-ticket-form" style="height:44px; font-size:1rem; font-weight:600; padding:0 24px;">Cancelar</button>
                </div>
              </form>
            </div>
          </div>
