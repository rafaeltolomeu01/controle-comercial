<div class="card" id="prospect-form-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
              <span class="card-title">Adicionar Novo Prospecto (Lead)</span>
              <button class="btn btn-primary" id="btn-open-prospect-form" type="button">+ Cadastrar Lead</button>
            </div>
            <div id="prospect-form-container" class="hidden" style="padding: 24px;">
            <form id="prospect-form">
              <div class="form-row">
                <div class="form-group" style="grid-column:1 / -1; padding:14px; border:1px solid var(--border-color); border-radius:12px; background:rgba(59,130,246,0.06); margin-bottom:6px;">
                  <label style="display:flex; gap:10px; align-items:center; font-weight:700; cursor:pointer; font-size:1rem;">
                    <input type="checkbox" id="prosp-has-cnpj" style="width:20px; height:20px;">
                    Você tem o CNPJ do cliente?
                  </label>
                  <small style="color:var(--text-muted); display:block; margin-top:6px;">Se marcar sim, digite o CNPJ antes de preencher o resto. O sistema busca endereço, bairro, número, cidade, razão social e CNAE automaticamente.</small>
                </div>
                <div id="prosp-cnpj-fields" class="form-row" style="display:none; grid-column:1 / -1; margin:0 0 8px 0; padding:14px; border:1px solid var(--border-color); border-radius:12px; background:rgba(255,255,255,0.02);">
                  <div class="form-group">
                    <label for="prosp-cnpj">CNPJ</label>
                    <input type="text" id="prosp-cnpj" placeholder="00.000.000/0001-00" inputmode="numeric">
                    <small id="prosp-cnpj-status" style="display:block; margin-top:4px; color:var(--text-muted); font-size:0.72rem;"></small>
                  </div>
                  <div class="form-group">
                    <label for="prosp-razao-social">Razão Social</label>
                    <input type="text" id="prosp-razao-social" placeholder="Preenchido pela API">
                  </div>
                  <div class="form-group">
                    <label for="prosp-nome-fantasia">Nome Fantasia</label>
                    <input type="text" id="prosp-nome-fantasia" placeholder="Preenchido pela API">
                  </div>
                  <div class="form-group">
                    <label for="prosp-zipcode">CEP</label>
                    <input type="text" id="prosp-zipcode" placeholder="Preenchido pela API">
                  </div>
                  <div class="form-group">
                    <label for="prosp-address">Logradouro / Rua</label>
                    <input type="text" id="prosp-address" placeholder="Preenchido pela API">
                  </div>
                  <div class="form-group">
                    <label for="prosp-number">Número</label>
                    <input type="text" id="prosp-number" placeholder="Preenchido pela API">
                  </div>
                  <div class="form-group">
                    <label for="prosp-neighborhood">Bairro</label>
                    <input type="text" id="prosp-neighborhood" placeholder="Preenchido pela API">
                  </div>
                  <div class="form-group">
                    <label for="prosp-cnae">CNAE Principal</label>
                    <input type="text" id="prosp-cnae" placeholder="Código CNAE">
                  </div>
                  <div class="form-group" style="grid-column:1 / -1;">
                    <label for="prosp-cnae-desc">Atividade principal do CNPJ</label>
                    <input type="text" id="prosp-cnae-desc" placeholder="Descrição da atividade principal">
                  </div>
                </div>
                <div class="form-group">
                  <label for="prosp-name">Nome do Comércio</label>
                  <input type="text" id="prosp-name" required placeholder="Ex: Supermercado do João">
                </div>
                <div class="form-group">
                  <label for="prosp-contact">Responsável</label>
                  <input type="text" id="prosp-contact" required placeholder="Ex: João da Silva">
                </div>
                <div class="form-group">
                  <label for="prosp-phone">Telefone</label>
                  <input type="tel" id="prosp-phone" required placeholder="Ex: (11) 98888-8888">
                </div>
                <div class="form-group">
                  <label for="prosp-city">Cidade</label>
                  <input type="text" id="prosp-city" required placeholder="Ex: Belo Horizonte">
                </div>
                <div class="form-group">
                  <label for="prosp-category">Categoria</label>
                  <select id="prosp-category" required>
                    <!-- Injected dynamically -->
                  </select>
                </div>
                <div class="form-group">
                  <label for="prosp-competitor">Concorrente Atual</label>
                  <input type="text" id="prosp-competitor" placeholder="Ex: Distribuidora X ou Nenhum">
                </div>
                <div class="form-group">
                  <label for="prosp-unit">Unidade Responsável</label>
                  <select id="prosp-unit" required>
                    <!-- Injected dynamically -->
                  </select>
                </div>
                <div class="form-group" id="group-prosp-seller">
                  <label for="prosp-seller">Vendedor Vinculado</label>
                  <select id="prosp-seller" required>
                    <!-- Injected dynamically -->
                  </select>
                </div>
                <div class="form-group">
                  <label for="prosp-photo">Foto da Fachada</label>
                  <input type="file" id="prosp-photo" accept="image/*">
                  <div id="prosp-photo-preview-container" style="display:none; margin-top:8px;">
                    <img id="prosp-photo-preview" src="" style="max-height:80px; border-radius:4px; border:1px solid var(--border-color);">
                  </div>
                </div>
                <div class="form-group">
                  <label for="prosp-observation">Observação</label>
                  <textarea id="prosp-observation" rows="2" placeholder="Informações adicionais..." style="resize:vertical;"></textarea>
                </div>
              </div>
              <div style="display:flex; gap:12px; margin-top:24px;">
                <button type="submit" class="btn btn-primary" style="flex:1; height:44px; font-size:1rem; font-weight:600;">Registrar Lead Comercial</button>
                <button type="button" class="btn btn-secondary" id="btn-cancel-prospect-form" style="height:44px; font-size:1rem; font-weight:600; padding:0 24px;">Cancelar</button>
              </div>
            </form>
            </div>
          </div>

          <!-- Lista de leads (substitui o Kanban para não ficar extensa) -->
          <div class="prospect-list-card" style="margin-top: 20px;">
            <div class="prospect-list-header">
              <div>
                <h3>Leads cadastrados</h3>
                <p>Visualização em lista. Clique em qualquer lead para abrir o dossiê completo.</p>
              </div>
              <div id="prospect-status-summary" class="prospect-status-summary"></div>
            </div>
            <div id="prospect-list-container" class="prospect-list-container"></div>
          </div>
