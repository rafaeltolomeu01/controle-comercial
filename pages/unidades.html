<div class="card" id="unit-form-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
              <span class="card-title">Cadastrar Nova Unidade (Filial)</span>
              <button class="btn btn-primary" id="btn-open-unit-form" type="button">+ Cadastrar Unidade</button>
            </div>
            
            <div id="unit-form-container" class="hidden" style="padding: 24px;">
              <form id="unit-form">
                <div class="form-row" style="align-items: flex-end;">
                  <div class="form-group" style="flex-grow: 1; margin-bottom: 0;">
                    <label for="unit-name">Nome da Unidade / Filial</label>
                    <input type="text" id="unit-name" required placeholder="Ex: Distribuidora Rio de Janeiro">
                  </div>
                  <div style="display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary" style="height: 38px;">Cadastrar Unidade</button>
                    <button type="button" class="btn btn-secondary" id="btn-cancel-unit-form" style="height: 38px;">Cancelar</button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Unidades Operacionais Cadastradas</span>
            </div>
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th style="width: 10%;">ID</th>
                    <th style="width: 40%;">Nome da Unidade</th>
                    <th style="width: 15%; text-align: center;">Leads / Prospects</th>
                    <th style="width: 15%; text-align: center;">Clientes Ativos</th>
                    <th style="width: 20%; text-align: center;">Chamados Ativos</th>
                  </tr>
                </thead>
                <tbody id="units-table-body">
                  <!-- Injected dynamically -->
                </tbody>
              </table>
            </div>
          </div>
