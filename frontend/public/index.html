<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#bf1438"><title>Controle de Campo</title><link rel="manifest" href="/manifest.json"><style>
:root{--red:#bf1438;--yellow:#f5b400;--blue:#253a56;--bg:#f7f8fb;--card:#fff;--text:#172033;--muted:#6b7280;--line:#e5e7eb;--ok:#10b981;--danger:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0;border-radius:14px;padding:12px 16px;font-weight:800}.primary{background:linear-gradient(135deg,var(--red),#e3345c);color:#fff}.secondary{background:#fff;border:1px solid var(--line);color:var(--blue)}.danger{background:#fee2e2;color:#b91c1c}.ok{background:#dcfce7;color:#166534}.login{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top left,#fff 0,#fff5f7 35%,#f7f8fb 100%);padding:22px}.login-card{width:min(430px,100%);background:#fff;border:1px solid var(--line);box-shadow:0 24px 70px #1f293733;border-radius:28px;padding:30px}.brand{display:flex;align-items:center;gap:14px;margin-bottom:22px}.brand-logo{width:54px;height:54px;border-radius:16px;object-fit:contain;background:#fff;border:1px solid var(--line);padding:6px}.brand h1{font-size:24px;margin:0;color:var(--red)}.field{display:grid;gap:7px;margin:12px 0}.field label{font-weight:800;color:#334155;font-size:14px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:#fff;color:var(--text);outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);box-shadow:0 0 0 4px #bf143820}.password-wrap{display:flex;gap:8px}.password-wrap input{flex:1}.password-wrap button{padding:0 12px}.app{display:none;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:280px;background:#fff;border-right:1px solid var(--line);padding:18px;z-index:20}.side-head{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid var(--line)}.side-head strong{font-size:20px;color:var(--blue)}.menu{display:grid;gap:8px;margin-top:18px}.menu button{display:flex;align-items:center;gap:10px;background:transparent;color:#475569;text-align:left;justify-content:flex-start}.menu button.active,.menu button:hover{background:#fff1f2;color:var(--red)}.side-user{position:absolute;left:18px;right:18px;bottom:18px;border-top:1px solid var(--line);padding-top:16px;color:#475569}.main{margin-left:280px;min-height:100vh}.topbar{position:sticky;top:0;background:#ffffffdd;backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:10;padding:18px 26px;display:flex;align-items:center;justify-content:space-between;gap:14px}.topbar h2{margin:0;color:var(--blue);font-size:25px}.top-actions{display:flex;align-items:center;gap:12px}.content{padding:26px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 8px 30px #0f172a0d}.stat{display:flex;align-items:center;gap:14px}.stat b{font-size:28px;color:var(--blue)}.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}.tabs button.active{background:#fff1f2;color:var(--red);border:1px solid #fecdd3}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.table-wrap{overflow:auto}.table{width:100%;border-collapse:separate;border-spacing:0;margin-top:14px}.table th,.table td{text-align:left;padding:13px;border-bottom:1px solid var(--line);vertical-align:top}.table th{color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;background:#f1f5f9;color:#334155;font-weight:800;font-size:12px}.modal{display:none;position:fixed;inset:0;background:#0007;z-index:50;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.modal-card{width:min(900px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:24px;padding:22px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.mobile-menu{display:none}.empty{color:var(--muted);text-align:center;padding:30px}.toast{position:fixed;right:20px;bottom:20px;background:#172033;color:#fff;padding:14px 18px;border-radius:16px;z-index:99}.searchbox{max-width:420px}.logo-preview{max-width:120px;max-height:70px;object-fit:contain}.muted{color:var(--muted)}.detail-view{display:grid;gap:14px}.detail-header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:14px}.detail-header h2{margin:0;color:var(--blue)}.detail-header p{margin:6px 0 0;color:var(--muted)}.detail-status{background:#fff1f2;color:var(--red);border:1px solid #fecdd3;border-radius:999px;padding:8px 14px;font-weight:900}.detail-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}.detail-card h3{margin:0 0 12px;color:var(--red)}.detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.detail-grid div{background:#f8fafc;border:1px solid #eef2f7;border-radius:14px;padding:12px;min-height:68px}.detail-grid small{display:block;color:#64748b;font-weight:800;margin-bottom:5px}.detail-grid b{display:block;color:#172033;word-break:break-word}.detail-photo{max-width:180px;max-height:140px;object-fit:cover;border-radius:14px;border:1px solid var(--line);margin-top:8px}@media print{body>*:not(.modal){display:none!important}.modal{display:block!important;position:static!important;background:#fff!important;padding:0!important}.modal-card{box-shadow:none!important;border-radius:0!important;max-height:none!important;width:100%!important}.modal .toolbar{display:none!important}.detail-card{break-inside:avoid}.detail-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.sidebar{transform:translateX(-105%);transition:.2s}.sidebar.open{transform:none}.main{margin-left:0}.mobile-menu{display:inline-flex}.topbar{padding:14px}.content{padding:14px}.grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.table{min-width:850px}.card{padding:18px}.modal-card{padding:16px}.topbar h2{font-size:20px}}
</style></head><body>
<section id="login" class="login"><div class="login-card"><div class="brand"><img class="brand-logo" src="/amaretto-logo.svg"><div><h1>Controle de Campo</h1><div class="muted">Amaretto • JDS • JAD</div></div></div><div class="field"><label>E-mail ou usuário</label><input id="loginUser" autocomplete="username" placeholder="Digite seu e-mail ou usuário"></div><div class="field"><label>Senha</label><div class="password-wrap"><input id="loginPass" type="password" autocomplete="current-password" placeholder="Digite sua senha"><button class="secondary" onclick="togglePass()">👁️</button></div></div><button class="primary" style="width:100%" onclick="login()">Entrar no painel</button><p class="muted" style="font-size:13px">Admin inicial: master / Master@2026</p></div></section>
<section id="app" class="app"><aside id="sidebar" class="sidebar"><div class="side-head"><img id="sideLogo" class="brand-logo" src="/amaretto-logo.svg"><strong id="sideCompany">Amaretto</strong></div><div class="menu" id="menu"></div><div class="side-user"><b id="sideUser">Usuário</b><br><span id="sideRole">Perfil</span><br><button class="danger" style="margin-top:12px" onclick="logout()">Sair</button></div></aside><main class="main"><header class="topbar"><div style="display:flex;align-items:center;gap:12px"><button class="mobile-menu secondary" onclick="sidebar.classList.toggle('open')">☰</button><h2 id="pageTitle">Painel</h2></div><div class="top-actions"><select id="companyFilter" onchange="reloadPage()"></select><img id="topLogo" class="brand-logo" src="/amaretto-logo.svg"></div></header><div id="content" class="content"></div></main></section>
<div id="modal" class="modal"><div class="modal-card"><div class="toolbar"><h2 id="modalTitle"></h2><button class="secondary" onclick="closeModal()">Fechar</button></div><div id="modalBody"></div></div></div><script>
const API='';let token=localStorage.getItem('cc_token')||'';let user=null;let companies=[];let page='dashboard';let refreshTimer=null;const pages=[['dashboard','Painel Geral','▦'],['leads','Prospecção (Leads)','☊'],['clients','Clientes','👥'],['expenses','Despesas e Saldo','$'],['equipments','Equipamentos','▭'],['calls','Chamados Mecânicos','🔧'],['products','Simulador de Troca','↝'],['settings','Configurações','⚙']];
function money(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function toast(t){let d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2600)}
function api(path,opt={}){opt.headers={...(opt.headers||{}),Authorization:'Bearer '+token}; if(opt.body && !(opt.body instanceof FormData)){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(opt.body)} return fetch(API+path,opt).then(async r=>{let data=await r.json().catch(()=>({})); if(!r.ok) throw new Error(data.error||'Erro'); return data})}
function togglePass(){loginPass.type=loginPass.type==='password'?'text':'password'}async function login(){try{let r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:loginUser.value,password:loginPass.value})}).then(async r=>{let d=await r.json();if(!r.ok)throw new Error(d.error);return d});token=r.token;localStorage.setItem('cc_token',token);user=r.user;await start()}catch(e){toast(e.message)}}function logout(){localStorage.removeItem('cc_token');location.href='/' }
async function start(){try{if(!user){user=(await api('/api/me')).user}companies=await api('/api/companies');login.style.display='none';app.style.display='block';renderShell();route();}catch(e){localStorage.removeItem('cc_token');login.style.display='grid';app.style.display='none'}}
function renderShell(){sideUser.textContent=user.name;sideRole.textContent=user.role+' | '+(user.company_name||'');sideCompany.textContent=user.company_name||'Amaretto';if(user.company_logo){sideLogo.src=user.company_logo;topLogo.src=user.company_logo}menu.innerHTML=pages.map(p=>`<button id="m_${p[0]}" onclick="location.hash='${p[0]}'"><span>${p[2]}</span>${p[1]}</button>`).join('');companyFilter.innerHTML=(isAdmin()?'<option value="">Todas as unidades</option>':'')+companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');companyFilter.value=isAdmin()?'':user.company_id||''}
function isAdmin(){return ['ADMIN','ADMINISTRADOR'].includes((user?.role||'').toUpperCase())}function isFinance(){return isAdmin()||/financeiro/i.test(user?.role||'')}
window.onhashchange=route;function route(){page=(location.hash||'#dashboard').slice(1);if(!pages.some(p=>p[0]===page))page='dashboard';document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));document.getElementById('m_'+page)?.classList.add('active');pageTitle.textContent=pages.find(p=>p[0]===page)?.[1]||'Painel';sidebar.classList.remove('open');reloadPage();clearInterval(refreshTimer);refreshTimer=setInterval(reloadPage,60000)}function scopeQS(){let c=companyFilter.value;return c?'?company_id='+encodeURIComponent(c):''}function reloadPage(){({dashboard,leads,clients,expenses,equipments,calls,products,settings}[page]||dashboard)()}
function card(t,v){return `<div class="card stat"><div style="font-size:28px;color:var(--red)">●</div><div><span class="muted">${t}</span><br><b>${v}</b></div></div>`}
async function dashboard(){let [le,ex,ba,ca]=await Promise.all([api('/api/leads'),api('/api/expenses'),api('/api/balances'),api('/api/calls')]);content.innerHTML=`<div class="grid">${card('Leads',le.length)}${card('Despesas',money(ex.reduce((a,x)=>a+Number(x.value||0),0)))}${card('Saldo aprovado',money(ba.filter(x=>x.status==='aprovado').reduce((a,x)=>a+Number(x.amount||0),0)))}${card('Chamados abertos',ca.filter(x=>x.status!=='fechado').length)}</div><div class="card" style="margin-top:18px"><h3>Ações rápidas</h3><div class="toolbar"><button class="primary" onclick="location.hash='leads';setTimeout(()=>openLead(),200)">+ Novo Lead</button><button class="secondary" onclick="location.hash='clients';setTimeout(()=>openClient(),200)">+ Cliente</button><button class="secondary" onclick="location.hash='expenses';setTimeout(()=>openExpense(),200)">+ Despesa</button></div></div>`}
function table(rows,cols,actions=''){return `<div class="table-wrap"><table class="table"><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}${actions?'<th>Ações</th>':''}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${cols.map(c=>`<td>${c[1](r)||''}</td>`).join('')}${actions?`<td>${actions(r)}</td>`:''}</tr>`).join(''):`<tr><td colspan="${cols.length+1}" class="empty">Nenhum registro encontrado.</td></tr>`}</tbody></table></div>`}
async function leads(){let rows=await api('/api/leads');content.innerHTML=`<div class="card"><div class="toolbar"><h3>Leads cadastrados</h3><button class="primary" onclick="openLead()">+ Cadastrar Lead</button></div>${table(rows,[['Comércio',r=>`<b>${r.name||r.razao_social||'-'}</b><br><small>Concorrente: ${r.competitor||'-'}</small>`],['Responsável',r=>r.contact],['Telefone',r=>r.phone],['CNPJ/CNAE',r=>`${r.cnpj||''}<br><small>${r.cnae||''} ${r.cnae_desc||''}</small>`],['Cidade',r=>`${r.neighborhood||''} ${r.city||''}`],['Status',r=>`<span class="badge">${r.status}</span>`],['Vendedor',r=>r.user_name]], r=>`<button class="secondary" onclick='view(${JSON.stringify(r)})'>Ver</button>` )}</div>`}
function cnpjBlock(){return `<div class="card"><label><input type="checkbox" id="hasCnpj" onchange="cnpjFields.style.display=this.checked?'grid':'none'"> Você tem o CNPJ do cliente?</label><div id="cnpjFields" class="form-grid" style="display:none;margin-top:10px"><div class="field"><label>CNPJ</label><input name="cnpj" onblur="buscaCnpj(this.form,this.value)"></div><div class="field"><label>Razão Social</label><input name="razao_social"></div><div class="field"><label>Nome Fantasia</label><input name="nome_fantasia"></div><div class="field"><label>CEP</label><input name="zipcode"></div><div class="field"><label>Rua</label><input name="address"></div><div class="field"><label>Número</label><input name="number"></div><div class="field"><label>Bairro</label><input name="neighborhood"></div><div class="field"><label>CNAE</label><input name="cnae"></div><div class="field"><label>Atividade</label><input name="cnae_desc"></div></div></div>`}
async function buscaCnpj(form,v){try{let d=await api('/api/cnpj/'+v);Object.entries({razao_social:d.razao_social,nome_fantasia:d.nome_fantasia,zipcode:d.cep,address:d.logradouro,number:d.numero,neighborhood:d.bairro,city:d.cidade,cnae:d.cnae,cnae_desc:d.atividade_principal}).forEach(([k,val])=>{if(form[k])form[k].value=val||''});toast('CNPJ encontrado')}catch(e){toast('CNPJ não encontrado, preencha manualmente')}}
function openLead(){modalTitle.textContent='Cadastrar Lead';modalBody.innerHTML=`<form id="f" onsubmit="saveForm(event,'/api/leads','leads')">${cnpjBlock()}<div class="form-grid"><div class="field"><label>Nome do comércio</label><input name="name" required></div><div class="field"><label>Responsável</label><input name="contact"></div><div class="field"><label>Telefone</label><input name="phone"></div><div class="field"><label>Cidade</label><input name="city"></div><div class="field"><label>Categoria</label><input name="category"></div><div class="field"><label>Concorrente atual</label><input name="competitor"></div><div class="field"><label>Foto da fachada</label><input type="file" name="photo" accept="image/*"></div></div><div class="field"><label>Observação</label><textarea name="observation"></textarea></div><button class="primary">Salvar Lead</button></form>`;modal.classList.add('open')}
async function clients(){let rows=await api('/api/clients');content.innerHTML=`<div class="card"><div class="toolbar"><h3>Clientes</h3><button class="primary" onclick="openClient()">+ Cadastrar Cliente</button></div>${table(rows,[['Nome',r=>r.name],['CNPJ',r=>r.cnpj],['Telefone',r=>r.phone],['Status',r=>`<span class="badge">${r.status}</span>`],['Vendedor',r=>r.user_name]])}</div>`}function openClient(){modalTitle.textContent='Cadastrar Cliente';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/clients','clients')">${cnpjBlock()}<div class="form-grid"><div class="field"><label>Nome</label><input name="name" required></div><div class="field"><label>Categoria</label><input name="category"></div><div class="field"><label>Telefone</label><input name="phone"></div><div class="field"><label>E-mail</label><input name="email"></div><div class="field"><label>Foto</label><input type="file" name="photo"></div></div><button class="primary">Salvar Cliente</button></form>`;modal.classList.add('open')}
async function expenses(){let rows=await api('/api/expenses');let total=rows.reduce((a,x)=>a+Number(x.value||0),0);content.innerHTML=`<div class="tabs"><button class="active">Despesas</button><button onclick="openBalance()">Solicitar Saldo</button></div><div class="grid">${card('Total',money(total))}${card('Pendentes',rows.filter(x=>x.status==='pendente').length)}${card('Aprovadas',rows.filter(x=>x.status==='aprovado').length)}</div><div class="card" style="margin-top:18px"><div class="toolbar"><h3>Despesas</h3><button class="primary" onclick="openExpense()">+ Registrar Despesa</button></div>${table(rows,[['Data',r=>new Date(r.created_at).toLocaleString('pt-BR')],['Finalidade',r=>r.purpose],['Vendedor',r=>r.user_name],['Valor',r=>money(r.value)],['Status',r=>`<span class="badge">${r.status}</span>`]], r=>`${isFinance()?`<button class="ok" onclick="statusExpense('${r.id}','aprovado')">Aprovar</button> <button class="danger" onclick="statusExpense('${r.id}','reprovado')">Reprovar</button>`:''} ${isAdmin()?`<button class="danger" onclick="delExpense('${r.id}')">Excluir</button>`:''}`)}</div>`}
function openExpense(){modalTitle.textContent='Registrar Despesa';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/expenses','expenses')"><div class="form-grid"><div class="field"><label>Finalidade</label><input name="purpose" required></div><div class="field"><label>Tipo</label><input name="operation_type"></div><div class="field"><label>Rota</label><input name="route"></div><div class="field"><label>Placa</label><input name="plate"></div><div class="field"><label>Hospedagem</label><input name="hotel" type="number" step="0.01"></div><div class="field"><label>Alimentação</label><input name="food" type="number" step="0.01"></div><div class="field"><label>Abastecimento</label><input name="fuel" type="number" step="0.01"></div><div class="field"><label>Fotos</label><input name="photos" type="file" multiple></div></div><button class="primary">Salvar</button></form>`;modal.classList.add('open')}async function statusExpense(id,status){await api('/api/expenses/'+id+'/status',{method:'PATCH',body:{status}});expenses()}async function delExpense(id){if(confirm('Excluir despesa?')){await api('/api/expenses/'+id,{method:'DELETE'});expenses()}}
function openBalance(){modalTitle.textContent='Solicitar Saldo';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/balances','expenses')"><div class="form-grid"><div class="field"><label>Destino</label><input name="destination" required></div><div class="field"><label>Valor</label><input name="amount" type="number" step="0.01" required></div></div><button class="primary">Solicitar</button></form>`;modal.classList.add('open')}
async function equipments(){let [eq,mv]=await Promise.all([api('/api/equipments'),api('/api/movements')]);content.innerHTML=`<div class="card"><div class="toolbar"><h3>Equipamentos</h3><button class="primary" onclick="openEquipment()">+ Equipamento</button><button class="secondary" onclick="openMovement()">+ Movimentação</button></div>${table(eq,[['Cliente',r=>r.client_name],['Patrimônio',r=>r.patrimony],['Modelo',r=>r.model],['Status',r=>r.status]])}</div><div class="card" style="margin-top:18px"><h3>Movimentações</h3>${table(mv,[['Cliente',r=>r.client_name],['Tipo',r=>r.type],['Patrimônio',r=>r.patrimony],['Status',r=>r.status]])}</div>`}function openEquipment(){modalTitle.textContent='Equipamento';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/equipments','equipments')"><div class="form-grid"><div class="field"><label>Cliente</label><input name="client_name"></div><div class="field"><label>Patrimônio</label><input name="patrimony"></div><div class="field"><label>Modelo</label><input name="model"></div><div class="field"><label>Voltagem</label><input name="voltage"></div></div><button class="primary">Salvar</button></form>`;modal.classList.add('open')}function openMovement(){modalTitle.textContent='Movimentação';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/movements','equipments')"><div class="form-grid"><div class="field"><label>Cliente</label><input name="client_name"></div><div class="field"><label>Tipo</label><select name="type"><option>Adição</option><option>Troca</option><option>Recolha</option></select></div><div class="field"><label>Patrimônio</label><input name="patrimony"></div><div class="field"><label>Equipamento</label><input name="equipment"></div></div><button class="primary">Salvar</button></form>`;modal.classList.add('open')}
async function calls(){let rows=await api('/api/calls');content.innerHTML=`<div class="card"><div class="toolbar"><h3>Chamados</h3><button class="primary" onclick="openCall()">+ Abrir Chamado</button></div>${table(rows,[['Cliente',r=>r.client_name],['Patrimônio',r=>r.patrimony],['Urgência',r=>r.urgency],['Problema',r=>r.issue],['Status',r=>r.status]])}</div>`}function openCall(){modalTitle.textContent='Chamado Mecânico';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/calls','calls')"><div class="form-grid"><div class="field"><label>Cliente</label><input name="client_name"></div><div class="field"><label>Patrimônio</label><input name="patrimony"></div><div class="field"><label>Urgência</label><select name="urgency"><option>Baixa</option><option>Média</option><option>Alta</option></select></div></div><div class="field"><label>Problema</label><textarea name="issue"></textarea></div><button class="primary">Salvar</button></form>`;modal.classList.add('open')}
async function products(){let rows=await api('/api/products');content.innerHTML=`<div class="card"><div class="toolbar"><h3>Simulador de Troca</h3><input class="field searchbox" id="prodSearch" placeholder="Pesquisar produto: Napolitano..." oninput="filterProducts()">${isAdmin()?'<button class="primary" onclick="openProduct()">+ Produto</button>':''}</div><div id="prodList">${productList(rows)}</div></div>`;window._products=rows}function productList(rows){return table(rows,[['Código',r=>r.code],['Produto',r=>r.name],['Categoria',r=>r.category],['Unitário',r=>money(r.unit_price)],['Caixa',r=>money(r.box_price)]])}function filterProducts(){let s=prodSearch.value.toLowerCase();prodList.innerHTML=productList((_products||[]).filter(p=>(p.name||'').toLowerCase().includes(s)||(p.code||'').toLowerCase().includes(s)||(p.category||'').toLowerCase().includes(s)))}function openProduct(){modalTitle.textContent='Cadastrar Produto';modalBody.innerHTML=`<form onsubmit="saveJson(event,'/api/products','products')"><div class="form-grid"><div class="field"><label>Código</label><input name="code"></div><div class="field"><label>Produto</label><input name="name" required></div><div class="field"><label>Categoria</label><input name="category"></div><div class="field"><label>Qtd caixa</label><input name="box_qty" type="number"></div><div class="field"><label>Preço caixa</label><input name="box_price" type="number" step="0.01"></div><div class="field"><label>Preço unitário</label><input name="unit_price" type="number" step="0.01"></div></div><button class="primary">Salvar Produto</button></form>`;modal.classList.add('open')}
async function settings(){let us=await api('/api/users'), cs=companies;content.innerHTML=`<div class="grid"><div class="card"><h3>Empresas</h3>${table(cs,[['Logo',r=>r.logo_url?`<img class="logo-preview" src="${r.logo_url}">`:'' ],['Nome',r=>r.name],['CNPJ',r=>r.document]])}<button class="primary" onclick="openCompany()">+ Empresa</button></div><div class="card"><h3>Usuários</h3>${table(us,[['Nome',r=>r.name],['Perfil',r=>r.role],['Empresa',r=>r.company_id],['Ativo',r=>r.active?'Sim':'Não']])}<button class="primary" onclick="openUser()">+ Usuário</button></div></div>`}function openCompany(){modalTitle.textContent='Empresa';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/companies','settings')"><div class="form-grid"><div class="field"><label>ID curto</label><input name="id" placeholder="jds, jad, amaretto"></div><div class="field"><label>Nome</label><input name="name" required></div><div class="field"><label>CNPJ</label><input name="document"></div><div class="field"><label>Logo</label><input name="logo" type="file"></div></div><button class="primary">Salvar</button></form>`;modal.classList.add('open')}function openUser(){modalTitle.textContent='Usuário';modalBody.innerHTML=`<form onsubmit="saveForm(event,'/api/users','settings')"><div class="form-grid"><div class="field"><label>Nome</label><input name="name" required></div><div class="field"><label>E-mail</label><input name="email"></div><div class="field"><label>Usuário</label><input name="username"></div><div class="field"><label>Senha</label><input name="password"></div><div class="field"><label>Perfil</label><select name="role"><option>VENDEDOR</option><option>SUPERVISOR</option><option>GERENTE</option><option>FINANCEIRO</option><option>ADMIN</option></select></div><div class="field"><label>Empresa</label><select name="company_id">${companies.map(c=>`<option value="${c.id}">${c.name}</option>`)}</select></div><div class="field"><label>Foto</label><input name="photo" type="file"></div></div><button class="primary">Salvar</button></form>`;modal.classList.add('open')}
async function saveForm(ev,path,after){ev.preventDefault();let btn=ev.submitter;btn.disabled=true;try{let fd=new FormData(ev.target);await api(path,{method:'POST',body:fd});toast('Salvo');closeModal();({leads,clients,expenses,equipments,calls,products,settings}[after]||reloadPage)()}catch(e){toast(e.message)}finally{btn.disabled=false}}async function saveJson(ev,path,after){ev.preventDefault();let o=Object.fromEntries(new FormData(ev.target));try{await api(path,{method:'POST',body:o});toast('Salvo');closeModal();({products,settings}[after]||reloadPage)()}catch(e){toast(e.message)}}function closeModal(){modal.classList.remove('open')}
function labelFromKey(k){return ({name:'Comércio',contact:'Responsável',phone:'Telefone',city:'Cidade',address:'Endereço',number:'Número',neighborhood:'Bairro',zipcode:'CEP',category:'Categoria',competitor:'Concorrente atual',status:'Status',cnpj:'CNPJ',razao_social:'Razão social',nome_fantasia:'Nome fantasia',cnae:'CNAE',cnae_desc:'Atividade principal',company_name:'Empresa',user_name:'Vendedor',created_at:'Data do cadastro',updated_at:'Última atualização',photo_url:'Foto'})[k]||k.replaceAll('_',' ').replace(/\b\w/g,l=>l.toUpperCase())}
function detailValue(k,v){if(v===null||v===undefined||v==='')return '-';if(k.includes('created_at')||k.includes('updated_at')||k==='date')return new Date(v).toLocaleString('pt-BR');if(k.includes('photo')&&String(v).startsWith('/uploads/'))return `<a href="${v}" target="_blank">Abrir foto</a><br><img class="detail-photo" src="${v}">`;return String(v)}
function view(r){
  modalTitle.textContent='Detalhes do cadastro';
  const main=[['name','Comércio'],['contact','Responsável'],['phone','Telefone'],['city','Cidade'],['category','Categoria'],['status','Status'],['company_name','Empresa'],['user_name','Vendedor']];
  const cnpj=[['cnpj','CNPJ'],['razao_social','Razão social'],['nome_fantasia','Nome fantasia'],['cnae','CNAE principal'],['cnae_desc','Atividade principal']];
  const endereco=[['address','Logradouro/Rua'],['number','Número'],['neighborhood','Bairro'],['zipcode','CEP']];
  const used=new Set([...main,...cnpj,...endereco].map(x=>x[0]));
  const card=(title,items)=>`<div class="detail-card"><h3>${title}</h3><div class="detail-grid">${items.map(([k,l])=>`<div><small>${l}</small><b>${detailValue(k,r[k])}</b></div>`).join('')}</div></div>`;
  const extras=Object.entries(r).filter(([k,v])=>!used.has(k)&&!['id','user_id','company_id'].includes(k)&&v!==null&&v!==undefined&&v!=='');
  modalBody.innerHTML=`<div id="printArea" class="detail-view"><div class="detail-header"><div><h2>${r.name||r.nome_fantasia||'Cadastro'}</h2><p>${r.company_name||''}</p></div><div class="detail-status">${r.status||'Sem status'}</div></div>${card('Dados principais',main)}${card('CNPJ e atividade',cnpj)}${card('Endereço',endereco)}${extras.length?`<div class="detail-card"><h3>Outras informações</h3><div class="detail-grid">${extras.map(([k,v])=>`<div><small>${labelFromKey(k)}</small><b>${detailValue(k,v)}</b></div>`).join('')}</div></div>`:''}</div><div class="toolbar" style="margin-top:14px;justify-content:flex-end"><button class="secondary" onclick="closeModal()">Fechar</button><button class="primary" onclick="printDetails()">Gerar PDF</button></div>`;
  modal.classList.add('open')
}
function printDetails(){window.print()}
if(token)start();
</script></body></html>
