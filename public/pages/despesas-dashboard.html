<div class="view-tabs no-print">
            <a href="#despesas" class="view-tab-btn">Despesas de Campo</a>
            <a href="#solicitacao-despesas" class="view-tab-btn" id="tab-balance-solicitation-from-dashboard">Solicitação de Saldo</a>
            <a href="#despesas-dashboard" class="view-tab-btn active" id="tab-balance-approvals-dashboard">Aprovação de Saldo</a>
          </div>

          <!-- Filtros -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Filtros de Pesquisa</span>
            </div>
            <form id="despesas-filtro-form">
              <div class="form-row" style="align-items: flex-end;">
                <div class="form-group">
                  <label for="filter-despesa-solicitante">Solicitante</label>
                  <input type="text" id="filter-despesa-solicitante" placeholder="Buscar solicitante...">
                </div>
                <div class="form-group">
                  <label for="filter-despesa-status">Status</label>
                  <select id="filter-despesa-status">
                    <option value="">Todos</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Aprovada">Aprovada</option>
                    <option value="Rejeitada">Rejeitada</option>
                    <option value="Correção Solicitada">Correção Solicitada</option>
                    <option value="Aprovada (não valor total)">Aprovada (não valor total)</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="filter-despesa-inicio">Data Início</label>
                  <input type="date" id="filter-despesa-inicio">
                </div>
                <div class="form-group">
                  <label for="filter-despesa-fim">Data Fim</label>
                  <input type="date" id="filter-despesa-fim">
                </div>
                <button type="submit" class="btn btn-primary" style="height: 38px;">Filtrar</button>
                <button type="button" id="btn-limpar-filtros-despesas" class="btn btn-secondary" style="height: 38px; margin-left: 8px;">Limpar</button>
              </div>
            </form>
          </div>

          <!-- Cards de Indicadores -->
          <div class="dashboard-grid" style="margin-bottom: 20px;">
            <div class="card stat-card">
              <div class="stat-icon" style="background-color: rgba(37,99,235,0.1); color: var(--primary-color);">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              </div>
              <div class="stat-info">
                <span class="stat-label">Total Solicitado</span>
                <span id="metric-despesas-solicitado" class="stat-value">R$ 0,00</span>
              </div>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="background-color: rgba(16,185,129,0.1); color: var(--success);">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div class="stat-info">
                <span class="stat-label">Total Aprovado</span>
                <span id="metric-despesas-aprovado" class="stat-value">R$ 0,00</span>
              </div>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="background-color: rgba(239,68,68,0.1); color: var(--danger);">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </div>
              <div class="stat-info">
                <span class="stat-label">Total Rejeitado</span>
                <span id="metric-despesas-rejeitado" class="stat-value">R$ 0,00</span>
              </div>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="background-color: rgba(245,158,11,0.1); color: var(--warning);">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              </div>
              <div class="stat-info">
                <span class="stat-label">Solicitações Pendentes</span>
                <span id="metric-despesas-pendentes" class="stat-value">0</span>
              </div>
            </div>
          </div>

          <!-- Tabela de Solicitações -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Solicitações Registradas</span>
            </div>
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Data</th>
                    <th>Solicitante</th>
                    <th>Placa</th>
                    <th>Rota</th>
                    <th style="text-align: right;">Hotel/Alim.</th>
                    <th style="text-align: right;">Abastecimento</th>
                    <th style="text-align: right;">Total Geral</th>
                    <th>Status</th>
                    <th style="text-align: center; width: 140px;">Ações</th>
                  </tr>
                </thead>
                <tbody id="despesas-solicitacoes-table-body">
                  <!-- Dynamic injection -->
                </tbody>
              </table>
            </div>
          </div>
