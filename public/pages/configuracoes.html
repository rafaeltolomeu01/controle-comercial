<div class="settings-hub-grid">
            <button class="settings-hub-card" type="button" onclick="window.location.hash='#usuarios'">
              <strong>Usuários e Acessos</strong>
              <span>Liberar usuários, editar perfil, permissões, empresa e unidade.</span>
            </button>
            <button class="settings-hub-card" type="button" onclick="window.location.hash='#unidades'">
              <strong>Empresas / Unidades</strong>
              <span>Cadastrar Minas, Espírito Santo e novas unidades.</span>
            </button>
            <button id="settings-card-empresas" class="settings-hub-card" type="button" onclick="window.location.hash='#empresas'">
              <strong>Criar Empresa</strong>
              <span>Cadastrar nova empresa/base no sistema. Somente Administrador.</span>
            </button>

            <button class="settings-hub-card" type="button" onclick="window.location.hash='#empresa'">
              <strong>Identidade da Empresa</strong>
              <span>Logo, nome, CNPJ e dados que aparecem no sistema/PDF.</span>
            </button>
          </div>
          <!-- 1. CATEGORIES AND TYPES GRID -->
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 20px;">
            <!-- Clients Categories -->
            <div class="card" style="margin-bottom:0;">
              <span class="card-title">Categorias de Clientes</span>
              <hr style="border-color: var(--border-color); margin: 12px 0;">
              <form id="config-client-category-form" style="display:flex; gap:8px; margin-bottom:12px;">
                <input type="text" id="config-client-category-name" required placeholder="Nova categoria..." style="height:32px; padding:6px 10px;">
                <button type="submit" class="btn btn-primary btn-sm" style="height:32px;">+</button>
              </form>
              <ul id="config-client-categories-list" style="list-style:none; display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; padding-right:4px;">
                <!-- Injected dynamically -->
              </ul>
            </div>

            <!-- Equipment Types -->
            <div class="card" style="margin-bottom:0;">
              <span class="card-title">Tipos de Equipamentos</span>
              <hr style="border-color: var(--border-color); margin: 12px 0;">
              <form id="config-eq-type-form" style="display:flex; gap:8px; margin-bottom:12px;">
                <input type="text" id="config-eq-type-name" required placeholder="Novo tipo..." style="height:32px; padding:6px 10px;">
                <button type="submit" class="btn btn-primary btn-sm" style="height:32px;">+</button>
              </form>
              <ul id="config-eq-types-list" style="list-style:none; display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; padding-right:4px;">
                <!-- Injected dynamically -->
              </ul>
            </div>

            <!-- Expense Categories -->
            <div class="card" style="margin-bottom:0;">
              <span class="card-title">Categorias de Despesas</span>
              <hr style="border-color: var(--border-color); margin: 12px 0;">
              <form id="config-exp-category-form" style="display:flex; gap:8px; margin-bottom:12px;">
                <input type="text" id="config-exp-category-name" required placeholder="Nova categoria..." style="height:32px; padding:6px 10px;">
                <button type="submit" class="btn btn-primary btn-sm" style="height:32px;">+</button>
              </form>
              <ul id="config-exp-categories-list" style="list-style:none; display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; padding-right:4px;">
                <!-- Injected dynamically -->
              </ul>
            </div>
          </div>

          <!-- 2. REASONS AND EMAILS GRID -->
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 20px;">
            <!-- Rejection Reasons -->
            <div class="card" style="margin-bottom:0;">
              <span class="card-title">Motivos de Reprovação (Clientes)</span>
              <hr style="border-color: var(--border-color); margin: 12px 0;">
              <form id="config-rejection-reason-form" style="display:flex; gap:8px; margin-bottom:12px;">
                <input type="text" id="config-rejection-reason-name" required placeholder="Novo motivo..." style="height:32px; padding:6px 10px;">
                <button type="submit" class="btn btn-primary btn-sm" style="height:32px;">+</button>
              </form>
              <ul id="config-rejection-reasons-list" style="list-style:none; display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; padding-right:4px;">
                <!-- Injected dynamically -->
              </ul>
            </div>

            <!-- Prospect Loss Reasons -->
            <div class="card" style="margin-bottom:0;">
              <span class="card-title">Motivos de Perda (Prospecção)</span>
              <hr style="border-color: var(--border-color); margin: 12px 0;">
              <form id="config-loss-reason-form" style="display:flex; gap:8px; margin-bottom:12px;">
                <input type="text" id="config-loss-reason-name" required placeholder="Novo motivo..." style="height:32px; padding:6px 10px;">
                <button type="submit" class="btn btn-primary btn-sm" style="height:32px;">+</button>
              </form>
              <ul id="config-loss-reasons-list" style="list-style:none; display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; padding-right:4px;">
                <!-- Injected dynamically -->
              </ul>
            </div>
          </div>
