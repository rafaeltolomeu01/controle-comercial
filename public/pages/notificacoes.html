<div class="view-content">
  <div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 15px;">
      <span class="card-title" style="margin: 0; font-size: 0.95rem;">Notificações</span>
      <div style="display: flex; gap: 8px; align-items: center;">
        <button class="btn btn-primary btn-sm" onclick="App.setupPushNotificationsManual()" type="button" style="padding: 4px 10px; font-size: 0.75rem; background: var(--primary-color); border: none; color: #fff;">🔔 Receber Push no Celular</button>
        <button class="btn btn-secondary btn-sm" onclick="App.markAllNotificationsRead()" type="button" style="padding: 4px 10px; font-size: 0.75rem;">Marcar todas como lidas</button>
      </div>
    </div>
    <div style="padding: 15px;">
      <div id="notif-page-list" style="display: flex; flex-direction: column; gap: 10px;">
        <!-- Injected dynamically -->
      </div>
    </div>
  </div>
</div>
