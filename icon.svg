<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Checkmark Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Icon Shapes -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle circular grid behind the icon -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8 8" />
  <circle cx="256" cy="256" r="100" fill="none" stroke="#475569" stroke-width="1" />
  
  <!-- Grid Lines to suggest "Field" or "Coordination" -->
  <line x1="256" y1="96" x2="256" y2="416" stroke="#334155" stroke-width="2" />
  <line x1="96" y1="256" x2="416" y2="256" stroke="#334155" stroke-width="2" />

  <!-- Shield / Field shape -->
  <path d="M256,120 L370,170 C370,300 256,380 256,380 C256,380 142,300 142,170 Z" 
        fill="none" stroke="url(#accentGrad)" stroke-width="12" stroke-linejoin="round" filter="url(#glow)" />
        
  <!-- Glowing Checkmark / Field Flag -->
  <path d="M200,250 L240,290 L312,210" 
        fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
